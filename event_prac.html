<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #toggle{
            background-color: lightblue;
            padding: 8px 18px;
            border: none;
            transition: transform 0.3s;
        }
        #toggle:active{
            transform: scale(0.8);
        }

        .dark{
            background-color: black;
            color: white;
        }
        .light{
            background-color: white;
            color: black;
        }


    </style>
</head>
<body>

    <button id="toggle" class="dark">light mode</button>
    <p>THis is sample</p>



    <script src="event_prac.js"></script>
    

</body>
</html>

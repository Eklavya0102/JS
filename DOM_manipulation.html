<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hello{
            background-color: lightpink;
            color: black;
            text-align: center;
            height: 150px;
            width: 250px;
            display: inline-block;
            margin-right: 5px;
            margin-bottom: 5px;
        }
        #second{
            background-color: lightgreen;
            height: 150px;
            width: 250px;
            display: inline-block;
            vertical-align: top;
           
        }

</head>
<body>
    <div class="hello" id="sample">
        <p>This is a paragraph</p>
        <span>This is a span</span>
    </div>
    <div id="second">
        <p>This is second div</p>
    </div>
    

    <script src="DOM_manipulation.js"></script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btn1,
        .btn2{
            background-color: lightblue;
            padding: 8px 18px;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }
        button:hover{
            transform: scale(1.08);
        }
        button:active{
            transform: scale(0.9);
        }

        .div1{
            height: 150px;
            width: 250px;
            margin: 10px;
            border: 2px solid black;
            background-color: lightpink;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- <button onclick="console.log('btn clicked');alert('Alert generated btn clicked')">Click ME !!</button>

    <button ondblclick="console.log('btn clicked 2X');alert('double Clicked')">Click ME 2X !!</button>


    <div onmouseover="console.log('the pointer is inside the div');">
        This is a div
    </div> -->


    <button class="btn1">Click me !</button>
    <button class="btn2">Click  2 X !</button>

    <div class="div1">
        This is a div
    </div>
    
    <script src="event.js"></script>
</body>
</html>

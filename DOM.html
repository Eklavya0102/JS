<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM_practise</title>
    <style>
        body{
            background-color: rgb(219, 151, 162);
            height: 2000px;
        }
        .navbar{
            position: fixed;
            top: 0px;
            left: 0px;
            right: 0px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            background-color: rgb(188, 45, 45);

            height: 60px;
            z-index: 100;
        }
        .left_nav{
            width: 200px;
            background-color: yellow;
        }
        .middle_nav{
            flex: 1;
            background-color: lightgreen;
        }
        .right_nav{
            width: 200px;
            background-color: lightgoldenrodyellow;
        }
        h1{
            background-color: red;
            margin-top: 200px;
        }

        button{
            background-color: rgb(19, 160, 207);
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            transition: all 0.3s;


            position: absolute;
            top: 150px;
            left: 150px;
        }
        button:hover{
            transform: scale(1.08);
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            hello
            <div class="left_nav">left section</div>
            <div class="middle_nav">Middle section</div>
            <div class="right_nav">right section</div>
            <h1 id="myid">Hello</h1>
        </nav>
    </header>
    <div id="text" style="visibility: hidden;">hidden text</div>
   
    <button>Click me !!</button>

    <script src="DOM.js"></script>
</body>
</html>
